# Prom Design System — Reference Spec
# -------------------------------------------------------------------
# Цей файл — сіткова специфікація Prom DS для Grow PM плагіну.
# Використовується скілами design-system, design-handoff, accessibility-review,
# design-critique, ux-copy та новим design-bridge.
#
# Джерела наповнення:
#   1. Figma MCP: get_libraries(fileKey) + search_design_system (run-time)
#   2. Публічні спостереження Prom.ua (web, iOS, Android)
#   3. Brand guidelines (TO-BE filled with canonical sources)
#
# Status legend:
#   confirmed  — токен підтверджений у Figma DS
#   observed   — взято з продакшн-UI, потребує підтвердження
#   placeholder — заглушка для подальшого заповнення
# -------------------------------------------------------------------

meta:
  name: Prom Design System
  product: Prom.ua
  organization: EVO / UAPROM LLC
  version: "1.0.0-draft"
  last_synced: "2026-04-20"
  source:
    figma_team_id: "1021675057377943036"
    figma_team_url: "https://www.figma.com/files/team/1021675057377943036/all-projects"
    figma_ds_file_key: "TODO"   # заповнити після знаходження файлу DS через get_libraries
    figma_ds_library_key: "TODO"
  languages: [uk, ru, kz]
  locales: [ua, kz]
  platforms: [web, android, ios]

# -------------------------------------------------------------------
# 1. Brand & principles
# -------------------------------------------------------------------
brand:
  tone_of_voice:
    primary: "Доступний, практичний, без пафосу. Звертання 'ти' у b2c-сценаріях, 'ви' — для продавців."
    avoid:
      - 'зайва англіцизація (клікніть, чекаут)'
      - 'слова без потреби — просто, легко, швидко'
      - 'умовний спосіб — можливо, ви захочете → хочеш додати?'
    examples_good:
      - "Додай відгук — покупцям важливо знати твою думку"
      - "Не знайшли те, що шукали? Уточни категорію або напиши нам"
    examples_bad:
      - "Будь ласка, завершіть процес оформлення замовлення"
      - "Дякуємо за ваш цінний відгук"
  personality:
    - trusted
    - supportive
    - practical
    - neighborly
  localization_rules:
    - "UI і pushes: українською за замовчуванням, російська як fallback, казахська на kz"
    - "Дати: DD.MM.YYYY (ua), DD/MM/YYYY (kz)"
    - "Валюта: ₴ (ua), ₸ (kz), виводити з пробілом перед знаком"

# -------------------------------------------------------------------
# 2. Color tokens
# -------------------------------------------------------------------
colors:
  brand:
    prom_primary:
      value: "#7B04DF"           # confirmed from official Prom.ua presentation template (2026-04-20)
      status: confirmed
      usage: "Primary CTA, brand accent, title bars, hero backgrounds"
      contrast:
        on_white: 6.2            # AA passes for normal text, AAA for large
        on_black: 3.4            # AA fails for normal, AA passes for large
    prom_primary_hover:
      value: "#6803B8"           # derived (darker shade for pressed)
      status: placeholder
      usage: "hover/pressed state primary CTA"
    prom_primary_subtle:
      value: "#F0E5FC"           # derived (5% tint for backgrounds)
      status: placeholder
      usage: "background badges/notifications, tag chips"
    prom_dark:
      value: "#222223"           # confirmed from template (used for dark mode BG and body)
      status: confirmed
      usage: "Dark-mode hero backgrounds, headlines на білому"
  neutrals:
    text_primary:     { value: "#222223", status: confirmed, source: "base_prom.pptx XML (5 occurrences)", usage: "Body text, headings на світлому фоні" }
    text_secondary:   { value: "#5F6368", status: observed, usage: "Secondary text, meta" }
    text_disabled:    { value: "#B1B4B8", status: placeholder }
    surface_primary:  { value: "#FFFFFF", status: confirmed }
    surface_secondary: { value: "#F5F6F7", status: observed, usage: "Cards background, sections divider" }
    prom_dark:        { value: "#222223", status: confirmed, source: "base_prom.pptx XML", usage: "Dark hero background, cover slides" }
    border_default:   { value: "#E3E5E8", status: observed }
    divider:          { value: "#EDEEF0", status: placeholder }
  semantic:
    success: { value: "#2AA746", status: placeholder, usage: "Order placed, verified seller" }
    warning: { value: "#F4A523", status: placeholder, usage: "Low stock, promo ending" }
    error:   { value: "#D43A2F", status: placeholder, usage: "Form errors, cancellations" }
    info:    { value: "#2F6DF0", status: placeholder, usage: "Informational banners" }
  rating:
    star_filled: "#FFB800"
    star_empty:  "#D9D9D9"
    status: observed

# -------------------------------------------------------------------
# 3. Typography
# -------------------------------------------------------------------
typography:
  font_family:
    primary:   { value: "Montserrat, sans-serif", status: confirmed, source: "base_prom.pptx XML (216 occurrences)" }
    display:   { value: "Montserrat ExtraBold, sans-serif", status: confirmed, source: "base_prom.pptx XML (160 occurrences)", usage: "H1, hero numbers, section dividers" }
    mono:      { value: "Menlo, monospace", status: placeholder }
  scale:
    display:   { size: 32, line_height: 40, weight: 700 }
    h1:        { size: 24, line_height: 32, weight: 700 }
    h2:        { size: 20, line_height: 28, weight: 600 }
    h3:        { size: 18, line_height: 24, weight: 600 }
    body_l:    { size: 16, line_height: 24, weight: 400 }
    body_m:    { size: 14, line_height: 20, weight: 400 }
    body_s:    { size: 12, line_height: 16, weight: 400 }
    caption:   { size: 11, line_height: 14, weight: 400 }
    button:    { size: 14, line_height: 20, weight: 600 }
  rules:
    - "Мінімальний розмір тексту на web — 14px (уникати 12px для основного тексту)"
    - "На mobile — body_l для first-level UI"
    - "Weight 700 використовуємо лише для H1 та Display"

# -------------------------------------------------------------------
# 4. Spacing, radius, elevation
# -------------------------------------------------------------------
spacing:
  scale: [2, 4, 8, 12, 16, 20, 24, 32, 40, 48, 64, 80]
  aliases:
    xs: 4
    s:  8
    m:  16
    l:  24
    xl: 32
    xxl: 48
radius:
  none: 0
  s: 4
  m: 8
  l: 12
  xl: 16
  pill: 9999
elevation:
  none:   "none"
  level1: "0 1px 2px rgba(0,0,0,0.08)"
  level2: "0 4px 12px rgba(0,0,0,0.10)"
  level3: "0 8px 24px rgba(0,0,0,0.14)"
  usage:
    level1: "cards, list items"
    level2: "dropdowns, popovers, product card hover"
    level3: "modals, drawers"

# -------------------------------------------------------------------
# 5. Key components (що використовуються у FET-зоні)
# -------------------------------------------------------------------
components:
  - id: button_primary
    name: Button / Primary
    purpose: "CTA в межах екрана (купити, оформити, додати відгук)"
    states: [default, hover, pressed, focused, disabled, loading]
    sizes: [s, m, l]
    tokens: { bg: colors.brand.prom_primary, text: "#FFFFFF", radius: radius.m }
    a11y:
      min_target: 44             # mobile touch
      focus_ring: "2px outline-primary offset 2px"
  - id: button_secondary
    name: Button / Secondary
    purpose: "Другорядні дії (відкрити деталі, все про продавця)"
    tokens: { bg: "transparent", border: colors.neutrals.border_default, text: colors.neutrals.text_primary }
  - id: input_text
    name: Input / Text
    states: [default, focused, filled, error, disabled]
    a11y:
      label_required: true
      error_association: "aria-describedby → error text"
  - id: product_card
    name: Product Card (КТ preview у лістингах)
    used_in: [listing, search_results, brand_page, category_page]
    key_elements:
      - image (ratio 1:1, lazy-load)
      - title (2 lines ellipsis)
      - price (з %-знижкою, якщо є)
      - seller_badge (trusted/official)
      - rating_stars (якщо > 0 відгуків)
      - cta_add_to_cart / cta_open_kt
    edge_cases:
      - немає фото → placeholder
      - немає відгуків → приховати, не показувати "0"
      - знижка > 70% → badge "Хіт знижок"
  - id: product_page_block_reviews
    name: Product Page / Reviews Block
    epic_ref: SHOPEX-3080
    key_elements:
      - aggregate rating + count
      - distribution bars
      - filters (rating, with photo, verified)
      - review cards (author, date, rating, text, photos, seller reply)
      - pagination
    empty_state: "Про цей товар ще не писали. Стань першим — ми закинемо тобі нагадування після доставки."
  - id: qa_block
    name: Product Page / Q&A Block
    epic_ref: SHOPEX-6610
    key_elements:
      - ask_question_cta
      - question_list (з відповідями продавця, корисно/некорисно)
      - answer_form
    empty_state: "Питань поки немає. Запитай продавця — відповідь прийде в пуш."
  - id: listing_filters
    name: Listing / Filters Sidebar (web) / Bottom sheet (mobile)
    key_elements:
      - chip_selected_filters
      - facets (category, price range, attributes, seller type)
      - sort_dropdown
    edge_cases:
      - 0 результатів → "Спробуй розширити фільтри"
  - id: order_cancel_flow
    name: Order / Cancel Flow
    purpose: "BL + UX скасування замовлення покупцем"
    steps: [reason_pick, confirmation, feedback_optional]
    copy_tone: "Ок, скасуємо. Допоможи зрозуміти, чому — ми покращимо досвід"
  - id: compare_products
    name: Compare Products
    platforms: [web, android, ios]
    max_items: 4

# -------------------------------------------------------------------
# 6. Patterns
# -------------------------------------------------------------------
patterns:
  empty_states:
    rules:
      - "Показуй причину, не просто 'порожньо'"
      - "Завжди пропонуй одну конкретну дію"
      - "Ілюстрація — тільки якщо вона інформативна (не декоративна)"
  error_messages:
    rules:
      - "Що сталось + що зробити"
      - "Не 'Помилка 500', а 'Не змогли завантажити — спробуємо ще раз?'"
      - "Не переводити провину на юзера"
  confirmation_dialogs:
    destructive_action_cta: "Так, скасувати"
    cancel_cta: "Ні, залишити"
  notifications:
    success_duration_ms: 3000
    error_duration_ms: 6000
    position_desktop: "top-right"
    position_mobile: "bottom-snackbar"
  progressive_disclosure:
    - "Використовувати 'Показати більше' для довгих списків відгуків/питань"
    - "На mobile — accordion замість паралельних колонок"

# -------------------------------------------------------------------
# 7. Accessibility targets
# -------------------------------------------------------------------
a11y:
  target_standard: "WCAG 2.1 AA"
  stretch_targets: ["WCAG 2.1 AAA for rating stars & price", "AA for error/success colors"]
  requirements:
    - "Contrast normal text ≥ 4.5:1; large text ≥ 3:1"
    - "Усі інтерактивні елементи досяжні з клавіатури (tab order логічний)"
    - "Focus ring видимий на всіх CTA, input, card"
    - "Touch target ≥ 44×44px на mobile"
    - "Labels на всіх input; error повідомлення через aria-describedby"
    - "Motion: respect prefers-reduced-motion"
    - "Підтримка screen-reader українською (lang='uk')"
  known_gaps_to_address:   # наповнюється по мірі аудиту
    - id: gap_001
      platform: web
      component: product_card
      issue: "Ціна зі знижкою — тільки колір, без текстового прояснення для SR"
      priority: P2
    - id: gap_002
      platform: ios
      component: rating_stars
      issue: "SR читає 'image' замість '4 of 5 stars'"
      priority: P1

# -------------------------------------------------------------------
# 8. UX Copy library (seed)
# -------------------------------------------------------------------
copy_library:
  ctas:
    add_to_cart: "У кошик"
    buy_now: "Купити зараз"
    ask_seller: "Запитати продавця"
    write_review: "Написати відгук"
    open_product: "Відкрити товар"
    compare: "Порівняти"
  empty_states:
    search_no_results: "Ми нічого не знайшли. Спробуй інші слова або прибери фільтри"
    cart_empty: "Кошик поки порожній. Загляни у підбірки або категорії"
    reviews_empty: "Про цей товар ще не писали. Стань першим — ми нагадаємо після доставки"
    qa_empty: "Питань поки немає. Запитай — відповідь прийде в пуш"
  errors:
    network: "Щось із мережею. Перевір з'єднання і спробуй ще раз"
    not_found_404: "Такої сторінки немає. Повертайся на головну"
    server_500: "У нас проблема на серверах. Ми вже розбираємось — повернись за хвилину"
    form_required: "Заповни це поле"
    form_phone_invalid: "Перевір номер телефону — щось не сходиться"
  confirmations:
    order_cancel: "Справді скасувати замовлення?"
    remove_from_cart: "Прибрати з кошика?"
  success:
    review_added: "Дякуємо, відгук опубліковано"
    order_placed: "Замовлення оформлено. Продавець уже бачить його"

# -------------------------------------------------------------------
# 9. Platform-specific notes
# -------------------------------------------------------------------
platforms:
  web:
    breakpoints: { mobile: 320, tablet: 768, desktop: 1200, wide: 1440 }
    container_max: 1280
    notes:
      - "Header sticky; меганю відкривається по hover на desktop, по tap на tablet"
      - "Мінімальна ширина — 320px"
  android:
    design_spec: "Material 3 adaptation з Prom brand"
    navigation: "Bottom nav 5 tabs: Home, Catalog, Messages, Orders, Profile"
    notes:
      - "Elevation через Material elevation з Prom color overlay"
  ios:
    design_spec: "Human Interface Guidelines + Prom brand"
    navigation: "Tab bar 5 tabs; Large title на main screens"
    notes:
      - "Haptic feedback на успішних діях"

